<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Maintenance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e6fffa 0%, #ffffff 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #333;
        }

        .maintenance-container {
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        .icon-box {
            font-size: 60px;
            color: #2ecc71;
            margin-bottom: 20px;
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        p {
            font-size: 16px;
            color: #7f8c8d;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .status-badge {
            background: #f1c40f;
            color: #fff;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }

        .contact-btn {
            display: block;
            background: #2ecc71;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .contact-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="maintenance-container">
    <div class="icon-box">
        <i class="fa-solid fa-gear"></i>
    </div>
    <div class="status-badge">Maintenance Mode</div>
    <h1>সাইটটি বর্তমানে বন্ধ আছে</h1>
    <p>আমরা সাইটের কিছু জরুরি কাজ করছি। খুব শীঘ্রই আমরা আবার ফিরে আসবো। সাময়িক অসুবিধার জন্য আমরা দুঃখিত।</p>
    
    <a href="" class="contact-btn">
        <i class="fa-brands fa-telegram"></i> এডমিনের সাথে যোগাযোগ করুন
    </a>
</div>

</body>
</html>
