<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সাইট বন্ধ আছে | Site Maintenance</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            color: #38bdf8;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            color: #94a3b8;
            line-height: 1.6;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid #38bdf8;
            border-radius: 50px;
            color: #38bdf8;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">⚙️</div>
        <div class="status-badge">Maintenance Mode</div>
        <h1>দুঃখিত! আমাদের সাইট বর্তমানে বন্ধ আছে।</h1>
        <p>আমরা সাইটের কিছু টেকনিক্যাল কাজ করছি। খুব শীঘ্রই আমরা আবার ফিরে আসবো। আমাদের সাথেই থাকুন।</p>
        
        <div class="footer">
            &copy; 2026 HGZY CLUB  | সকল অধিকার সংরক্ষিত।
        </div>
    </div>

</body>
</html>
